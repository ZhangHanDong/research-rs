name = "tech"
description = "Rust / AI / general tech — HN + GitHub + arXiv"

[[rule]]
kind = "hn-item"
host = "news.ycombinator.com"
path = "/item"
query_param = { id = "[0-9]+" }
executor = "postagent"
template = 'postagent send --anonymous "https://hacker-news.firebaseio.com/v0/item/{id}.json"'

[[rule]]
kind = "hn-topstories"
host = "news.ycombinator.com"
path_any_of = ["/", "", "/news"]
executor = "postagent"
template = 'postagent send --anonymous "https://hacker-news.firebaseio.com/v0/topstories.json"'

[[rule]]
kind = "github-issue"
host = "github.com"
path_segments = ["{owner}", "{repo}", "issues", "{num}"]
executor = "postagent"
template = 'postagent send --anonymous "https://api.github.com/repos/{owner}/{repo}/issues/{num}"'

# Incremental source reading — /blob/<ref>/<path> → raw.githubusercontent.com
# Raw host doesn't count against GitHub's anonymous rate limit.
[[rule]]
kind = "github-file"
host = "github.com"
path_segments = ["{owner}", "{repo}", "blob", "{ref}", "{...path}"]
executor = "postagent"
template = 'postagent send --anonymous "https://raw.githubusercontent.com/{owner}/{repo}/{ref}/{path}"'

# Directory listing — /tree/<ref>/<path> → Contents API (base64 or JSON listing).
[[rule]]
kind = "github-tree"
host = "github.com"
path_segments = ["{owner}", "{repo}", "tree", "{ref}", "{...path}"]
executor = "postagent"
template = 'postagent send --anonymous "https://api.github.com/repos/{owner}/{repo}/contents/{path}?ref={ref}"'

# Pass-through for raw.githubusercontent.com URLs — return the raw bytes.
[[rule]]
kind = "github-raw"
host = "raw.githubusercontent.com"
path_segments = ["{owner}", "{repo}", "{ref}", "{...path}"]
executor = "postagent"
template = 'postagent send --anonymous "{url}"'

[[rule]]
kind = "github-repo-readme"
host = "github.com"
path_segments = ["{owner}", "{repo}"]
executor = "postagent"
template = 'postagent send --anonymous "https://api.github.com/repos/{owner}/{repo}/readme"'

[[rule]]
kind = "arxiv-abs"
host = "arxiv.org"
path_segments = ["abs", "{id}"]
executor = "postagent"
template = 'postagent send --anonymous "http://export.arxiv.org/api/query?id_list={id}"'

[fallback]
executor = "browser"
kind = "browser-fallback"
template = '''actionbook browser new-tab "{url}" --session <s> --tab <t> && actionbook browser wait network-idle --session <s> --tab <t> && actionbook browser text [--readable] --session <s> --tab <t>'''
