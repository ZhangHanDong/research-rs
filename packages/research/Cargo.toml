[package]
name = "research"
version = "0.1.0"
edition = "2024"
description = "Research workflow CLI — orchestrates postagent + actionbook browser for reproducible research sessions"
license = "MIT"

[[bin]]
name = "research"
path = "src/main.rs"

[lib]
name = "research"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", default-features = false, features = ["serde", "clock"] }
dirs = "6"
fs2 = "0.4"
toml = "0.8"
regex = "1"
pulldown-cmark = { version = "0.13", default-features = false, features = ["html"] }

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
